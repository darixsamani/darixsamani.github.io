<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1121"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="500" height="500" rx="100" fill="url(#bg)"/>

  <!-- Outer Gear / Cron representation -->
  <circle cx="250" cy="250" r="180" fill="none" stroke="url(#accent)" stroke-width="8" stroke-dasharray="20 15"/>

  <!-- Dashboard Grid (Monitoring) -->
  <rect x="120" y="120" width="100" height="80" rx="10" fill="#1E293B" stroke="#475569" stroke-width="4"/>
  <rect x="280" y="120" width="100" height="80" rx="10" fill="#1E293B" stroke="#475569" stroke-width="4"/>
  <rect x="120" y="240" width="100" height="80" rx="10" fill="#1E293B" stroke="#475569" stroke-width="4"/>
  <rect x="280" y="240" width="100" height="80" rx="10" fill="#1E293B" stroke="#475569" stroke-width="4"/>

  <!-- Inner Clock Ring -->
  <circle cx="250" cy="250" r="120" fill="#0F172A" stroke="#334155" stroke-width="6"/>

  <!-- Clock marks -->
  <line x1="250" y1="145" x2="250" y2="155" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <line x1="250" y1="345" x2="250" y2="355" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <line x1="145" y1="250" x2="155" y2="250" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <line x1="345" y1="250" x2="355" y2="250" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>

  <!-- Clock Hands (Cron Scheduler) -->
  <line x1="250" y1="250" x2="180" y2="180" stroke="#CBD5E1" stroke-width="8" stroke-linecap="round"/>
  <line x1="250" y1="250" x2="310" y2="210" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <circle cx="250" cy="250" r="12" fill="#F8FAFC"/>

  <!-- Lightning Bolt (FastAPI Speed) -->
  <polygon points="255,130 220,235 245,235 220,360 280,245 255,245 280,130" fill="url(#bolt)" stroke="#FBBF24" stroke-width="2"/>
</svg>