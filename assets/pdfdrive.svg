<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1121"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="scrapeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="jsonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- Background Rounded Square -->
  <rect width="500" height="500" rx="90" fill="url(#bg)"/>

  <!-- Outer Network Ring (Web Scraper) -->
  <circle cx="250" cy="220" r="130" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="8 6"/>
  <circle cx="250" cy="220" r="110" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Spider Web Radiating Lines -->
  <line x1="250" y1="90" x2="250" y2="160" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>
  <line x1="250" y1="280" x2="250" y2="350" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>
  <line x1="120" y1="220" x2="190" y2="220" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>
  <line x1="310" y1="220" x2="380" y2="220" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>
  <line x1="158" y1="128" x2="208" y2="178" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>
  <line x1="292" y1="178" x2="342" y2="128" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>
  <line x1="158" y1="312" x2="208" y2="262" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>
  <line x1="292" y1="262" x2="342" y2="312" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>

  <!-- Spider / Scraper Icon (Center top) -->
  <circle cx="250" cy="220" r="8" fill="url(#scrapeGrad)"/>

  <!-- PDF Document Shape -->
  <rect x="175" y="170" width="150" height="110" rx="6" fill="url(#docGrad)"/>
  <!-- Document Folded Corner -->
  <path d="M 325 170 L 295 170 L 295 200 L 325 200 Z" fill="#94A3B8"/>
  <path d="M 325 170 L 295 170 L 295 200 L 325 200 Z" fill="#CBD5E1" opacity="0.5"/>
  <path d="M 295 170 L 295 200 L 325 200" fill="none" stroke="#94A3B8" stroke-width="2"/>

  <!-- Text Lines on Document -->
  <rect x="195" y="190" width="110" height="5" rx="2.5" fill="#475569"/>
  <rect x="195" y="205" width="90" height="5" rx="2.5" fill="#475569"/>
  <rect x="195" y="220" width="100" height="5" rx="2.5" fill="#475569"/>
  <rect x="195" y="235" width="80" height="5" rx="2.5" fill="#475569"/>
  <rect x="195" y="250" width="110" height="5" rx="2.5" fill="#475569"/>
  <rect x="195" y="265" width="70" height="5" rx="2.5" fill="#475569"/>

  <!-- JSONL Brackets (Left and Right) -->
  <text x="155" y="250" font-family="'Courier New', monospace" font-size="40" font-weight="700" fill="url(#jsonGrad)" text-anchor="middle">{</text>
  <text x="345" y="250" font-family="'Courier New', monospace" font-size="40" font-weight="700" fill="url(#jsonGrad)" text-anchor="middle">}</text>

  <!-- MongoDB Database Cylinder (Bottom) -->
  <ellipse cx="250" cy="320" rx="35" ry="10" fill="none" stroke="url(#dbGrad)" stroke-width="4"/>
  <ellipse cx="250" cy="340" rx="35" ry="10" fill="none" stroke="url(#dbGrad)" stroke-width="4"/>
  <line x1="215" y1="320" x2="215" y2="340" stroke="url(#dbGrad)" stroke-width="4"/>
  <line x1="285" y1="320" x2="285" y2="340" stroke="url(#dbGrad)" stroke-width="4"/>
  <!-- MongoDB Leaf Element (Stylized) inside the cylinder -->
  <path d="M 240 335 Q 250 320 250 325 Q 250 330 240 335 Z" fill="#10B981"/>
  <path d="M 260 335 Q 250 320 250 325 Q 250 330 260 335 Z" fill="#10B981"/>

  <!-- Data Flow Arrows (Scraper to DB) -->
  <line x1="230" y1="285" x2="230" y2="310" stroke="#38BDF8" stroke-width="2" stroke-dasharray="2 2"/>
  <line x1="270" y1="285" x2="270" y2="310" stroke="#38BDF8" stroke-width="2" stroke-dasharray="2 2"/>
  <polygon points="225,305 230,315 235,305" fill="#38BDF8"/>
  <polygon points="265,305 270,315 275,305" fill="#38BDF8"/>

  <!-- Project Name -->
  <text x="250" y="420" font-family="'Segoe UI', -apple-system, Arial, sans-serif" font-size="42" font-weight="800" fill="#F8FAFC" text-anchor="middle" letter-spacing="5">Pdfdrive</text>

  <!-- Subtitle Tagline -->
  <text x="250" y="450" font-family="'Segoe UI', -apple-system, Arial, sans-serif" font-size="12" font-weight="500" fill="#94A3B8" text-anchor="middle" letter-spacing="3">WEB SCRAPER · JSONL · MONGODB</text>
</svg>