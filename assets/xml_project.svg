<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1121"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="receiptGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="xmlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Rounded Square -->
  <rect width="500" height="500" rx="90" fill="url(#bgGrad)"/>

  <!-- Faint Academic Cap Outline (University Context) -->
  <path d="M 180 110 L 250 70 L 320 110 Z" fill="none" stroke="#334155" stroke-width="2" opacity="0.4"/>
  <rect x="200" y="110" width="100" height="15" rx="3" fill="none" stroke="#334155" stroke-width="2" opacity="0.4"/>

  <!-- XML Angle Brackets (Data Source) -->
  <text x="115" y="275" font-family="'Courier New', monospace" font-size="100" font-weight="700" fill="url(#xmlGrad)" text-anchor="middle" opacity="0.9" filter="url(#glow)">&lt;</text>
  <text x="385" y="275" font-family="'Courier New', monospace" font-size="100" font-weight="700" fill="url(#xmlGrad)" text-anchor="middle" opacity="0.9" filter="url(#glow)">&gt;</text>

  <!-- PDF Receipt Document -->
  <rect x="140" y="130" width="220" height="240" rx="8" fill="url(#receiptGrad)" stroke="#CBD5E1" stroke-width="4"/>
  
  <!-- Perforated Edge (Receipt Style) -->
  <line x1="140" y1="130" x2="140" y2="370" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4 6"/>
  
  <!-- Receipt Header -->
  <text x="250" y="165" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="800" fill="#1E293B" text-anchor="middle" letter-spacing="2">UNIVERSITY FEE RECEIPT</text>
  <line x1="160" y1="178" x2="340" y2="178" stroke="#CBD5E1" stroke-width="1"/>

  <!-- Receipt Data Rows (Tuition, Fees, etc.) -->
  <rect x="160" y="195" width="60" height="4" rx="2" fill="#64748B"/>
  <rect x="300" y="195" width="40" height="4" rx="2" fill="#64748B"/>
  <rect x="160" y="215" width="50" height="4" rx="2" fill="#64748B"/>
  <rect x="310" y="215" width="30" height="4" rx="2" fill="#64748B"/>
  <rect x="160" y="235" width="55" height="4" rx="2" fill="#64748B"/>
  <rect x="295" y="235" width="45" height="4" rx="2" fill="#64748B"/>

  <!-- Total Amount Line -->
  <line x1="160" y1="260" x2="340" y2="260" stroke="#94A3B8" stroke-width="2" stroke-dasharray="2 2"/>
  <rect x="160" y="275" width="65" height="6" rx="3" fill="#FBBF24"/>
  <text x="340" y="285" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="900" fill="#F59E0B" text-anchor="end">$ 5,200.00</text>

  <!-- PAID Stamp -->
  <circle cx="270" cy="205" r="24" fill="#EF4444" opacity="0.85" filter="url(#glow)"/>
  <text x="270" y="212" font-family="'Arial Black', Impact, sans-serif" font-size="16" font-weight="900" fill="#FFFFFF" text-anchor="middle" transform="rotate(-12 270 212)">PAID</text>

  <!-- XSLT / XSL-FO Transformation Gear (Processing Engine) -->
  <!-- Gear outer teeth -->
  <circle cx="250" cy="370" r="22" fill="none" stroke="url(#gearGrad)" stroke-width="6"/>
  <circle cx="250" cy="370" r="28" fill="none" stroke="url(#gearGrad)" stroke-width="4" stroke-dasharray="8 6"/>
  <!-- Gear center -->
  <circle cx="250" cy="370" r="8" fill="url(#gearGrad)"/>
  
  <!-- Data Flow Arrow (XML -> PDF) -->
  <path d="M 380 370 Q 400 370 400 300" fill="none" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>
  <polygon points="397,305 400,295 403,305" fill="#34D399"/>

  <!-- Project Name -->
  <text x="250" y="435" font-family="'Segoe UI', -apple-system, Arial, sans-serif" font-size="40" font-weight="800" fill="#F8FAFC" text-anchor="middle" letter-spacing="5">XML Project</text>

  <!-- Subtitle Tagline -->
  <text x="250" y="465" font-family="'Segoe UI', -apple-system, Arial, sans-serif" font-size="12" font-weight="500" fill="#94A3B8" text-anchor="middle" letter-spacing="3">XSL-FO · XSLT · PDF RECEIPT GENERATOR</text>
</svg>