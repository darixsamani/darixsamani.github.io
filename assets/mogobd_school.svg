<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1121"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="mongoLeaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4DB33D"/>
      <stop offset="100%" stop-color="#3FA72F"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Rounded Square -->
  <rect width="500" height="500" rx="90" fill="url(#bg)"/>

  <!-- Outer Query Network (Complex Queries & Relationships) -->
  <circle cx="250" cy="220" r="150" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="6 4"/>
  <circle cx="250" cy="220" r="130" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="2 4"/>
  
  <!-- Query Nodes (Student / Course / Department connections) -->
  <circle cx="140" cy="160" r="4" fill="#60A5FA" filter="url(#glow)"/>
  <circle cx="360" cy="160" r="4" fill="#60A5FA" filter="url(#glow)"/>
  <circle cx="140" cy="280" r="4" fill="#60A5FA" filter="url(#glow)"/>
  <circle cx="360" cy="280" r="4" fill="#60A5FA" filter="url(#glow)"/>
  <circle cx="250" cy="110" r="4" fill="#60A5FA" filter="url(#glow)"/>
  <circle cx="250" cy="330" r="4" fill="#60A5FA" filter="url(#glow)"/>
  
  <!-- Connecting Lines -->
  <line x1="250" y1="110" x2="140" y2="160" stroke="#60A5FA" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6"/>
  <line x1="250" y1="110" x2="360" y2="160" stroke="#60A5FA" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6"/>
  <line x1="140" y1="160" x2="140" y2="280" stroke="#60A5FA" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6"/>
  <line x1="360" y1="160" x2="360" y2="280" stroke="#60A5FA" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6"/>
  <line x1="140" y1="280" x2="250" y2="330" stroke="#60A5FA" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6"/>
  <line x1="360" y1="280" x2="250" y2="330" stroke="#60A5FA" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6"/>

  <!-- Database Cylinders (MongoDB Storage) - Bottom Base -->
  <ellipse cx="250" cy="350" rx="50" ry="12" fill="none" stroke="url(#dbGrad)" stroke-width="4"/>
  <ellipse cx="250" cy="370" rx="50" ry="12" fill="none" stroke="url(#dbGrad)" stroke-width="4"/>
  <line x1="200" y1="350" x2="200" y2="370" stroke="url(#dbGrad)" stroke-width="4"/>
  <line x1="300" y1="350" x2="300" y2="370" stroke="url(#dbGrad)" stroke-width="4"/>

  <!-- Open Book (University Knowledge) -->
  <path d="M 180 200 L 250 180 L 320 200 L 320 270 L 250 290 L 180 270 Z" fill="url(#bookGrad)" stroke="#94A3B8" stroke-width="3"/>
  <path d="M 250 180 L 250 290" stroke="#94A3B8" stroke-width="3"/>
  
  <!-- Book Text Lines (Student data) -->
  <rect x="195" y="215" width="45" height="4" rx="2" fill="#64748B"/>
  <rect x="195" y="230" width="35" height="4" rx="2" fill="#64748B"/>
  <rect x="195" y="245" width="40" height="4" rx="2" fill="#64748B"/>
  <rect x="260" y="215" width="45" height="4" rx="2" fill="#64748B"/>
  <rect x="260" y="230" width="35" height="4" rx="2" fill="#64748B"/>
  <rect x="260" y="245" width="40" height="4" rx="2" fill="#64748B"/>

  <!-- Graduation Cap (Academic) -->
  <rect x="200" y="150" width="100" height="20" rx="4" fill="url(#capGrad)" stroke="#475569" stroke-width="2"/>
  <polygon points="180,165 250,185 320,165 250,145" fill="url(#capGrad)" stroke="#475569" stroke-width="2"/>
  
  <!-- Tassel -->
  <line x1="310" y1="160" x2="330" y2="185" stroke="#FDE047" stroke-width="3" stroke-linecap="round"/>
  <circle cx="330" cy="187" r="3" fill="#FDE047"/>

  <!-- MongoDB Leaf (Three petals) embedded in the cap -->
  <path d="M 235 160 Q 240 145 250 155 Q 260 145 265 160 Q 255 165 250 160 Q 245 165 235 160 Z" fill="url(#mongoLeaf)" filter="url(#glow)"/>
  <path d="M 238 165 Q 250 175 250 185 Q 250 175 262 165 Z" fill="url(#mongoLeaf)" filter="url(#glow)"/>

  <!-- Project Name -->
  <text x="250" y="430" font-family="'Segoe UI', -apple-system, Arial, sans-serif" font-size="38" font-weight="800" fill="#F8FAFC" text-anchor="middle" letter-spacing="4">MongoDB School</text>

  <!-- Subtitle Tagline -->
  <text x="250" y="460" font-family="'Segoe UI', -apple-system, Arial, sans-serif" font-size="12" font-weight="500" fill="#94A3B8" text-anchor="middle" letter-spacing="3">STUDENT MANAGEMENT · COMPLEX QUERIES</text>
</svg>