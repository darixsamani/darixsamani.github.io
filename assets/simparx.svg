<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1121"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="maskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="aiGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="80" fill="url(#bg)"/>

  <!-- Morphological Grid (structuring element) - Background -->
  <rect x="150" y="110" width="200" height="180" rx="8" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- Document / Page Outline -->
  <rect x="160" y="120" width="180" height="160" rx="6" fill="#0F172A" stroke="#475569" stroke-width="4"/>

  <!-- Paragraph Text Lines (Standard Layout) -->
  <rect x="180" y="145" width="140" height="8" rx="4" fill="#64748B"/>
  <rect x="180" y="165" width="120" height="8" rx="4" fill="#64748B"/>
  <rect x="180" y="185" width="130" height="8" rx="4" fill="#64748B"/>
  <rect x="180" y="205" width="100" height="8" rx="4" fill="#64748B"/>
  <rect x="180" y="225" width="140" height="8" rx="4" fill="#64748B"/>

  <!-- Complex/Unstable Structure (dashed lines indicating complexity) -->
  <rect x="180" y="245" width="110" height="8" rx="4" fill="#475569" stroke="#F59E0B" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- Morphological Mask (highlighting a paragraph) -->
  <polygon points="170,190 330,175 330,260 170,275" fill="url(#maskGrad)" stroke="#38BDF8" stroke-width="3" filter="url(#glow)"/>

  <!-- AI Deep Learning Nodes & Connections (overlay on mask) -->
  <!-- Connections -->
  <line x1="340" y1="140" x2="290" y2="190" stroke="url(#aiGlow)" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="360" y1="200" x2="300" y2="230" stroke="url(#aiGlow)" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="340" y1="280" x2="280" y2="250" stroke="url(#aiGlow)" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="130" y1="140" x2="190" y2="190" stroke="url(#aiGlow)" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="110" y1="220" x2="180" y2="230" stroke="url(#aiGlow)" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- Nodes -->
  <circle cx="340" cy="140" r="6" fill="#A78BFA" filter="url(#glow)"/>
  <circle cx="360" cy="200" r="8" fill="#C084FC" filter="url(#glow)"/>
  <circle cx="340" cy="280" r="5" fill="#A78BFA" filter="url(#glow)"/>
  <circle cx="130" cy="140" r="6" fill="#A78BFA" filter="url(#glow)"/>
  <circle cx="110" cy="220" r="7" fill="#C084FC" filter="url(#glow)"/>

  <!-- Central Recognition Focus (Eye / Accuracy target) -->
  <circle cx="250" cy="230" r="15" fill="none" stroke="#FDE047" stroke-width="3" stroke-dasharray="6 4" filter="url(#glow)"/>
  <circle cx="250" cy="230" r="4" fill="#FDE047" filter="url(#glow)"/>

  <!-- Project Name -->
  <text x="250" y="420" font-family="'Segoe UI', -apple-system, Arial, sans-serif" font-size="38" font-weight="700" fill="#F8FAFC" text-anchor="middle" letter-spacing="6">simparx</text>
  
  <!-- Subtitle Tagline -->
  <text x="250" y="445" font-family="'Segoe UI', -apple-system, Arial, sans-serif" font-size="12" font-weight="400" fill="#94A3B8" text-anchor="middle" letter-spacing="3">PARAGRAPH RECOGNITION · AI ENHANCED</text>
</svg>